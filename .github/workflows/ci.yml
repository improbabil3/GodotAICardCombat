name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          godot-version: '4.7.0'

      - name: Godot version
        run: godot --version

      - name: CI placeholder
        run: echo "No automated tests configured; CI placeholder"
